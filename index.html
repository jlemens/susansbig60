<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Howdy Susan" />
<meta name="theme-color" content="#1a0f08" />
<meta name="format-detection" content="telephone=no" />
<title>Happy Birthday, Susan — A Cowboy's Tale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Smokum&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    font-family: 'Special Elite', 'Courier New', monospace;
    background: #1a0f08;
    color: #f5e6c8;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
    position: fixed;
    inset: 0;
  }

  /* ---------- BACKGROUND ---------- */
  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: url('Photos/background.jpeg') center center / cover no-repeat;
    overflow: hidden;
  }
  #stage::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(40,20,8,0.55) 100%),
      linear-gradient(to bottom, rgba(255,200,120,0.12), rgba(80,40,15,0.35));
    pointer-events: none;
  }

  /* Subtle dust particles */
  .dust {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,220,160,0.35);
    border-radius: 50%;
    pointer-events: none;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translate(0,0); opacity: 0; }
    20%  { opacity: 0.7; }
    100% { transform: translate(120px, -60px); opacity: 0; }
  }

  /* ---------- SAM ---------- */
  #sam-wrap {
    position: absolute;
    bottom: 0;
    left: 2%;
    height: 88vh;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.55));
    /* Hidden by default — gets revealed after the doors video. */
    opacity: 0;
    transform: translateX(-140%);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  body.sam-entering #sam-wrap {
    animation: samEnter 1.4s cubic-bezier(0.2, 0.85, 0.3, 1) forwards;
    transition: none;
  }
  body.sam-arrived #sam-wrap {
    opacity: 1;
    transform: translateX(0);
    animation: samBob 4s ease-in-out infinite;
  }
  body.shooting #sam-wrap {
    opacity: 0;
    transform: translate(-30px, 30px) scale(0.9);
    pointer-events: none;
    animation: none;
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  #sam-wrap img {
    height: 100%;
    width: auto;
    object-fit: contain;
  }
  @keyframes samBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  @keyframes samEnter {
    0%   { opacity: 0; transform: translateX(-140%); }
    55%  { opacity: 1; }
    100% { opacity: 1; transform: translateX(0); }
  }

  /* ---------- DOORS VIDEO (entry transition) ---------- */
  #doors-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    object-fit: cover;
    z-index: 110;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #doors-video.playing {
    opacity: 1;
  }
  #doors-video.gone {
    display: none;
  }

  /* ---------- SPEECH BUBBLE ---------- */
  #bubble {
    position: absolute;
    top: 6vh;
    left: 28vw;
    max-width: 540px;
    min-width: 280px;
    padding: 22px 28px 24px;
    background: linear-gradient(180deg, #fdf3d8 0%, #f0dca9 100%);
    color: #3a210e;
    border: 3px solid #5a3414;
    border-radius: 18px;
    box-shadow:
      0 0 0 4px #c9a35a,
      0 14px 30px rgba(0,0,0,0.55),
      inset 0 0 30px rgba(180,120,60,0.18);
    font-size: clamp(15px, 2vw, 20px);
    line-height: 1.45;
    z-index: 10;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #bubble.hidden { opacity: 0; transform: translateY(-10px) scale(0.96); pointer-events: none; }
  #bubble::before {
    content: "";
    position: absolute;
    bottom: -22px;
    left: 60px;
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 28px solid transparent;
    border-top: 28px solid #5a3414;
  }
  #bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 66px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 22px solid transparent;
    border-top: 20px solid #fdf3d8;
  }
  #bubble h1 {
    font-family: 'Rye', serif;
    font-size: clamp(22px, 3.2vw, 34px);
    color: #6e2a0c;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-shadow: 1px 1px 0 #c9a35a;
  }
  #bubble p { margin-bottom: 10px; }
  #bubble p:last-child { margin-bottom: 0; }
  #bubble .small {
    font-size: 0.85em;
    color: #7a4818;
    font-style: italic;
  }
  #bubble b, #bubble strong {
    font-weight: 800;
    color: #6e2a0c;
    background: linear-gradient(180deg, transparent 60%, #f0c97a 60%, #f0c97a 92%, transparent 92%);
    padding: 0 2px;
    letter-spacing: 0.3px;
  }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-block;
    margin-top: 14px;
    padding: 12px 26px;
    background: linear-gradient(180deg, #b04a1a 0%, #7a2c0a 100%);
    color: #fff5dc;
    font-family: 'Rye', serif;
    font-size: clamp(16px, 2vw, 20px);
    letter-spacing: 1.5px;
    border: 3px solid #3a1505;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 6px 0 #3a1505, 0 10px 16px rgba(0,0,0,0.5);
    transition: transform 0.08s, box-shadow 0.08s;
    text-shadow: 1px 1px 0 #3a1505;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #3a1505, 0 4px 8px rgba(0,0,0,0.5);
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    right: max(24px, env(safe-area-inset-right));
    z-index: 20;
    display: flex;
    gap: 14px;
    align-items: center;
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(30,15,5,0.78);
    border: 2px solid #c9a35a;
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Rye', serif;
    color: #ffd884;
    font-size: clamp(14px, 1.6vw, 18px);
    letter-spacing: 1px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    text-shadow: 1px 1px 0 #000;
  }
  .hud-pill span { color: #fff; }
  #hud.hidden { display: none; }

  /* ---------- BANDITS ---------- */
  .bandit {
    position: absolute;
    width: clamp(120px, 18vw, 220px);
    cursor: crosshair;
    z-index: 15;
    pointer-events: auto;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
    transform-origin: center bottom;
    animation: banditPop 0.35s ease-out;
    transition: transform 0.15s;
  }
  .bandit:hover { transform: scale(1.05); }
  .bandit.hit {
    animation: banditHit 0.95s ease-out forwards;
    pointer-events: none;
  }
  @keyframes banditPop {
    0%   { transform: translateY(40px) scale(0.6); opacity: 0; }
    60%  { transform: translateY(-6px) scale(1.06); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes banditHit {
    0%   { transform: scale(1) rotate(0); opacity: 1; }
    20%  { transform: scale(1.2) rotate(-8deg); filter: brightness(2) drop-shadow(0 0 20px #ffae3b); }
    55%  { transform: scale(1.05) rotate(-4deg) translateY(10px); opacity: 1; }
    100% { transform: scale(0.4) rotate(25deg) translateY(70px); opacity: 0; }
  }

  /* "BANG!" splat */
  .bang {
    position: absolute;
    pointer-events: none;
    z-index: 16;
    font-family: 'Rye', serif;
    font-size: clamp(38px, 6vw, 72px);
    color: #ffd84a;
    text-shadow:
      3px 3px 0 #6e2a0c,
      -2px -2px 0 #6e2a0c,
      0 0 22px rgba(255,180,60,0.9);
    transform: rotate(-12deg);
    animation: bang 1.5s ease-out forwards;
  }
  @keyframes bang {
    0%   { transform: rotate(-12deg) scale(0.4);  opacity: 0; }
    14%  { transform: rotate(-9deg)  scale(1.2);  opacity: 1; }
    24%  { transform: rotate(-7deg)  scale(1.0);  opacity: 1; }
    65%  { transform: rotate(-5deg)  scale(1.05) translateY(-10px); opacity: 1; }
    100% { transform: rotate(-3deg)  scale(1.25) translateY(-50px); opacity: 0; }
  }

  /* ---------- CONFETTI CANVAS ---------- */
  #confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ---------- VIGNETTE FRAME (wanted poster feel) ---------- */
  #frame {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 30;
    box-shadow: inset 0 0 180px rgba(20,8,2,0.85);
  }

  /* ---------- SPLASH (entry screen — guarantees iOS audio start) ---------- */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    background:
      radial-gradient(ellipse at center, rgba(40,18,5,0.55) 0%, rgba(15,7,2,0.92) 75%),
      url('Photos/background.jpeg') center center / cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    transition: opacity 0.6s ease;
  }
  #splash.gone {
    opacity: 0;
    pointer-events: none;
  }
  #splash .splash-card {
    max-width: 460px;
    padding: 36px 32px 32px;
    background: linear-gradient(180deg, #fdf3d8 0%, #f0dca9 100%);
    color: #3a210e;
    border: 3px solid #5a3414;
    border-radius: 14px;
    box-shadow:
      0 0 0 4px #c9a35a,
      0 18px 38px rgba(0,0,0,0.7);
    animation: splashIn 0.7s ease-out;
  }
  @keyframes splashIn {
    0%   { transform: translateY(20px) scale(0.94); opacity: 0; }
    100% { transform: translateY(0)    scale(1);    opacity: 1; }
  }
  #splash h1 {
    font-family: 'Rye', serif;
    font-size: clamp(28px, 5vw, 44px);
    color: #6e2a0c;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    text-shadow: 1px 1px 0 #c9a35a;
    line-height: 1.1;
  }
  #splash .star {
    font-size: 22px;
    color: #b04a1a;
    letter-spacing: 6px;
    margin-bottom: 14px;
  }
  #splash p {
    font-size: clamp(15px, 1.8vw, 18px);
    line-height: 1.45;
    margin-bottom: 8px;
  }
  #splash .small {
    font-size: 0.85em;
    color: #7a4818;
    font-style: italic;
    margin-bottom: 22px;
  }
  #splash .splash-btn {
    display: inline-block;
    padding: 16px 36px;
    background: linear-gradient(180deg, #b04a1a 0%, #7a2c0a 100%);
    color: #fff5dc;
    font-family: 'Rye', serif;
    font-size: clamp(18px, 2.4vw, 22px);
    letter-spacing: 2px;
    border: 3px solid #3a1505;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 6px 0 #3a1505, 0 10px 18px rgba(0,0,0,0.5);
    text-shadow: 1px 1px 0 #3a1505;
    animation: splashBtnPulse 1.8s ease-in-out infinite;
  }
  @keyframes splashBtnPulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 6px 0 #3a1505, 0 10px 18px rgba(0,0,0,0.5); }
    50%      { transform: scale(1.04); box-shadow: 0 6px 0 #3a1505, 0 14px 26px rgba(255,170,80,0.35); }
  }
  #splash .splash-btn:active {
    transform: translateY(4px) scale(1) !important;
    box-shadow: 0 2px 0 #3a1505 !important;
    animation: none;
  }

  /* ---------- MUTE BUTTON ---------- */
  #mute {
    position: fixed;
    bottom: max(18px, env(safe-area-inset-bottom));
    right: max(18px, env(safe-area-inset-right));
    z-index: 60;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(30,15,5,0.78);
    border: 2px solid #c9a35a;
    color: #ffd884;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: transform 0.1s, filter 0.1s;
  }
  #mute:active { transform: scale(0.92); }
  #mute.muted { filter: grayscale(0.6) opacity(0.7); }

  /* ---------- TYPING CURSOR ---------- */
  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1.05em;
    background: #6e2a0c;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s steps(2, end) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- iPHONE / PORTRAIT MOBILE ---------- */
  @media (max-width: 820px) {
    #sam-wrap {
      height: clamp(220px, 38dvh, 360px);
      left: -8%;
      bottom: max(0px, env(safe-area-inset-bottom));
    }

    /* Bubble lives at the TOP on phone so it never covers Sam */
    #bubble {
      top: calc(12px + env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      bottom: auto;
      max-width: none;
      min-width: 0;
      padding: 16px 18px 18px;
      max-height: 62dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 16px;
    }
    #bubble::before, #bubble::after { display: none; }
    #bubble h1 {
      font-size: 22px;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    #bubble p {
      font-size: 16px;
      line-height: 1.4;
    }

    /* Full-width tap-friendly buttons */
    .btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 16px 22px;
      font-size: 18px;
      box-shadow: 0 5px 0 #3a1505, 0 8px 14px rgba(0,0,0,0.5);
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #3a1505, 0 4px 8px rgba(0,0,0,0.5);
    }

    /* HUD on a single row, smaller pills, away from notch */
    #hud {
      top: calc(8px + env(safe-area-inset-top));
      right: calc(10px + env(safe-area-inset-right));
      left: calc(10px + env(safe-area-inset-left));
      gap: 8px;
      justify-content: space-between;
    }
    .hud-pill {
      padding: 7px 13px;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    /* Bigger bandit tap targets on phone */
    .bandit {
      width: clamp(140px, 36vw, 220px);
    }

    /* While the bubble is visible, dim Sam slightly so the eye goes up */
    #bubble:not(.hidden) ~ #sam-wrap { opacity: 0.85; }
  }

  /* Tiny phones (iPhone SE-class, 375px) */
  @media (max-width: 380px) {
    #sam-wrap { height: clamp(200px, 32dvh, 280px); }
    #bubble h1 { font-size: 20px; }
    #bubble p  { font-size: 15px; }
    .btn { font-size: 16px; padding: 14px 18px; }
  }

  /* Landscape phones — squish vertically */
  @media (max-height: 500px) and (orientation: landscape) {
    #sam-wrap { height: 80dvh; left: -6%; }
    #bubble {
      top: calc(8px + env(safe-area-inset-top));
      left: 38vw;
      right: max(10px, env(safe-area-inset-right));
      bottom: auto;
      max-height: 84dvh;
      padding: 12px 16px;
    }
    #bubble h1 { font-size: 18px; margin-bottom: 4px; }
    #bubble p  { font-size: 14px; }
    .btn { width: auto; display: inline-block; margin-top: 8px; padding: 10px 18px; font-size: 15px; }
  }
</style>
</head>
<body>

<div id="stage">
  <div id="sam-wrap">
    <img src="Photos/sam.png" alt="Sam Elliott" draggable="false" />
  </div>

  <div id="hud" class="hidden">
    <div class="hud-pill">Bandits: <span id="score">0</span> / <span id="goal">8</span></div>
    <div class="hud-pill">Time: <span id="timer">0:00</span></div>
  </div>

  <div id="bubble">
    <h1 id="b-title">Howdy there, Susan…</h1>
    <p id="b-text"></p>
    <div id="b-actions"></div>
  </div>
</div>

<button id="mute" aria-label="Toggle sound" title="Toggle sound">&#x1F50A;</button>

<div id="splash" role="dialog" aria-label="Welcome">
  <div class="splash-card">
    <h1>Howdy, Susan…</h1>
    <div class="star">&#x2605; &#x2605; &#x2605;</div>
    <p>A weather-beaten cowboy's been waitin' on ya at the edge o' town.</p>
    <p>He's got a tale to tell — an' a birthday wish from far away.</p>
    <p class="small">(Sound on for the full ride, partner.)</p>
    <button id="splash-btn" class="splash-btn">Step Inside &#x2192;</button>
  </div>
</div>

<video id="doors-video"
       src="Photos/doors.mp4"
       preload="auto"
       playsinline
       webkit-playsinline></video>

<div id="frame"></div>
<canvas id="confetti"></canvas>

<script>
/* =====================================================
   Happy Birthday, Susan — a cowboy mini-game
   ===================================================== */

const $ = sel => document.querySelector(sel);
const stage   = $('#stage');
const bubble  = $('#bubble');
const bTitle  = $('#b-title');
const bText   = $('#b-text');
const bActs   = $('#b-actions');
const hud     = $('#hud');
const scoreEl = $('#score');
const goalEl  = $('#goal');
const timerEl = $('#timer');

const BANDIT_IMGS = [
  'Photos/bandit1.png',
  'Photos/bandit2.png',
  'Photos/bandit3.png',
  'Photos/bandit4.png',
];
const TOTAL_BANDITS = 8;

let score = 0;
let gameActive = false;
let spawnTimer = null;
let elapsedTimer = null;
let startTime = 0;

/* ============================================================
   AUDIO  (built to survive iOS Safari's quirks)
   ============================================================ */

/* Build the music element in JS — same pattern as gunshots, which work.
   The HTML <audio> element gets ignored / replaced. */
const bgMusic = new Audio('sounds/background-music.mp3');
bgMusic.loop = true;
bgMusic.preload = 'auto';
bgMusic.volume = 0.35;
bgMusic.setAttribute('playsinline', '');
bgMusic.setAttribute('webkit-playsinline', '');

let muted = false;
let audioUnlocked = false;
let musicPlaying = false;
let musicShouldPlay = false;

/* Pool of gunshot Audio objects so rapid taps overlap cleanly */
const GUNSHOT_POOL_SIZE = 5;
const gunshotPool = Array.from({ length: GUNSHOT_POOL_SIZE }, () => {
  const a = new Audio('sounds/gunshot.mp3');
  a.preload = 'auto';
  a.volume = 0.65;
  a.setAttribute('playsinline', '');
  return a;
});
let gunshotIdx = 0;

function playGunshot() {
  if (muted) return;
  const a = gunshotPool[gunshotIdx];
  gunshotIdx = (gunshotIdx + 1) % GUNSHOT_POOL_SIZE;
  try { a.currentTime = 0; } catch (_) {}
  a.play().catch(() => {});
}

/* ---------- Sam's voice lines ---------- */
const VOICE_FILES = {
  scene1: 'sounds/Scene1.mp3',
  scene2: 'sounds/Scene2.mp3',
  scene3: 'sounds/Scene3.mp3',
  scene4: 'sounds/Scene4.mp3',
  scene5: 'sounds/Scene5.mp3',
};
const voiceLines = {};
Object.entries(VOICE_FILES).forEach(([key, src]) => {
  const a = new Audio(src);
  a.preload = 'auto';
  a.volume = 0.95;
  a.setAttribute('playsinline', '');
  a.setAttribute('webkit-playsinline', '');
  voiceLines[key] = a;
});

let currentVoice = null;
let musicDucked = false;

/* The music file is now mixed quiet enough that it can play continuously
   underneath Sam's voice without conflict, so this is a no-op. Kept as a
   function so we can re-enable ducking later by flipping ENABLE_DUCKING. */
const ENABLE_DUCKING = false;

function duckMusic(on) {
  if (!ENABLE_DUCKING) return;
  if (musicDucked === on) return;
  musicDucked = on;
  if (on) {
    try { bgMusic.pause(); } catch (_) {}
  } else {
    if (musicShouldPlay && !muted) {
      const p = bgMusic.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }
  }
}

/* Stop the current voice WITHOUT un-ducking the music. Used when the
   user taps "next" mid-voice so music stays paused into the next scene
   rather than briefly blaring between dialog blocks. */
function stopVoice() {
  if (currentVoice) {
    try { currentVoice.pause(); currentVoice.currentTime = 0; } catch (_) {}
  }
  currentVoice = null;
}

/* Returns the Audio object so callers can read its duration to sync typing. */
function playVoice(key) {
  if (muted) return null;
  const a = voiceLines[key];
  if (!a) return null;

  if (currentVoice && currentVoice !== a) {
    try { currentVoice.pause(); currentVoice.currentTime = 0; } catch (_) {}
  }

  currentVoice = a;
  try { a.currentTime = 0; } catch (_) {}
  duckMusic(true);   // pause music for the duration of this voice line

  const onEnd = () => {
    if (currentVoice === a) {
      currentVoice = null;
      duckMusic(false);   // music resumes when Sam stops talking
    }
    a.removeEventListener('ended', onEnd);
  };
  a.addEventListener('ended', onEnd);

  a.play().catch(() => {
    // If this play() fails entirely, restore music so we don't leave it paused.
    if (currentVoice === a) {
      currentVoice = null;
      duckMusic(false);
    }
  });
  return a;
}

/* Try to start music. Returns the underlying play() promise so callers
   can react. */
function tryPlayMusic() {
  if (muted) return Promise.resolve();
  const p = bgMusic.play();
  if (p && typeof p.then === 'function') {
    return p.then(() => { musicPlaying = true; })
            .catch(() => { musicPlaying = false; });
  }
  musicPlaying = true;
  return Promise.resolve();
}

/* Mark playback state from native events so we know if we need to retry. */
bgMusic.addEventListener('playing', () => { musicPlaying = true; });
bgMusic.addEventListener('pause',   () => { musicPlaying = false; });
bgMusic.addEventListener('ended',   () => { musicPlaying = false; tryPlayMusic(); });

/* Once the file has buffered enough, take another shot at autoplay —
   only after we've decided music *should* be playing (i.e. after the
   doors video has finished). */
['canplay', 'canplaythrough', 'loadeddata'].forEach(evt => {
  bgMusic.addEventListener(evt, () => {
    if (musicShouldPlay && audioUnlocked && !musicPlaying && !muted) tryPlayMusic();
  });
});

/* Trigger an explicit network load so iOS starts buffering ASAP. */
try { bgMusic.load(); } catch (_) {}

/* iOS Safari requires play() to be invoked from a real user gesture.
   On the first tap/click anywhere on the page, we:
     1. Call bgMusic.play() — this "unlocks" the element even if it
        rejects because the file isn't ready yet.
     2. Prime each gunshot Audio (play+pause) so future shots fire.
     3. Kick off a short retry loop: once unlocked, repeated play()
        calls are allowed and will succeed as soon as buffering finishes.
*/
/* Prime an Audio element so iOS will let us play it later: we briefly
   play it muted, then immediately pause and rewind. */
function primeForIOS(a) {
  a.muted = true;
  const p = a.play();
  if (p && typeof p.then === 'function') {
    p.then(() => { a.pause(); try { a.currentTime = 0; } catch (_) {} a.muted = false; })
     .catch(() => { a.muted = false; });
  } else {
    a.muted = false;
  }
}

const unlockAudio = () => {
  if (audioUnlocked) return;
  audioUnlocked = true;

  // Prime everything (music too) but do NOT start music yet — we want to
  // wait until the doors video has finished playing.
  primeForIOS(bgMusic);
  gunshotPool.forEach(a => {
    const p = a.play();
    if (p && typeof p.then === 'function') {
      p.then(() => { a.pause(); try { a.currentTime = 0; } catch (_) {} })
       .catch(() => {});
    }
  });
  Object.values(voiceLines).forEach(primeForIOS);
};

/* Called after the doors video finishes — this is when music actually
   starts. The retry loop covers slow buffering on cellular. */
function startMusic() {
  if (muted) return;
  musicShouldPlay = true;
  tryPlayMusic();
  let retries = 0;
  const retryId = setInterval(() => {
    if (musicPlaying || muted || retries++ > 12) {
      clearInterval(retryId);
      return;
    }
    tryPlayMusic();
  }, 500);
}
['pointerdown', 'touchstart', 'touchend', 'click', 'keydown'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { once: true, capture: true });
});

/* Mute toggle */

    if (musicShouldPlay && !musicDucked) {
      const p = bgMusic.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }
  }
});

/* ---------- Typewriter (supports **bold** markers) ---------- */
function typeOut(el, text, speed = 26) {
  return new Promise(resolve => {
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);

    let i = 0;
    let bold = false;
    let boldEl = null;

    const tick = () => {
      // Toggle bold on every "**" we encounter (no character is printed).
      while (i < text.length - 1 && text[i] === '*' && text[i + 1] === '*') {
        bold = !bold;
        if (bold) {
          boldEl = document.createElement('b');
          cursor.parentNode.insertBefore(boldEl, cursor);
        } else {
          boldEl = null;
        }
        i += 2;
      }

      if (i < text.length) {
        const ch = text[i];
        if (bold && boldEl) {
          boldEl.appendChild(document.createTextNode(ch));
        } else {
          cursor.insertAdjacentText('beforebegin', ch);
        }
        i++;
        setTimeout(tick, speed + (Math.random() * 24 - 12));
      } else {
        cursor.remove();
        resolve();
      }
    };
    tick();
  });
}

/* ---------- Sam dialog helper ---------- */

/* Wait for an Audio element's duration to be known (loadedmetadata). */
function awaitVoiceDuration(audio, timeoutMs = 800) {
  if (!audio) return Promise.resolve(null);
  if (audio.duration && isFinite(audio.duration)) return Promise.resolve(audio.duration);
  return new Promise(resolve => {
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      resolve(isFinite(audio.duration) ? audio.duration : null);
    };
    audio.addEventListener('loadedmetadata', finish, { once: true });
    audio.addEventListener('canplay',        finish, { once: true });
    setTimeout(finish, timeoutMs);
  });
}

/* Strip our **bold** markers when measuring text length for typing speed. */
function visibleLength(text) {
  return text.replace(/\*\*/g, '').length;
}

async function samSays({ title, text, actions = [], voice = null, typeRate = 1 }) {
  bubble.classList.remove('hidden');
  bTitle.textContent = title;
  bActs.innerHTML = '';

  let typeSpeed = 24;
  let voiceAudio = null;

  if (voice) {
    voiceAudio = playVoice(voice);
    if (voiceAudio) {
      const dur = await awaitVoiceDuration(voiceAudio);
      if (dur && dur > 0.4) {
        // Tune typing so it finishes ~250ms before Sam stops talking.
        // typeRate > 1 finishes proportionally earlier (faster typing).
        const chars = visibleLength(text);
        const targetMs = ((dur * 1000) - 250) / Math.max(0.1, typeRate);
        typeSpeed = Math.max(10, Math.min(70, targetMs / Math.max(1, chars)));
      }
    }
  }

  await typeOut(bText, text, typeSpeed);

  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = a.label;
    btn.onclick = () => {
      stopVoice();      // cut off the current voice line on advance
      a.onClick();
    };
    bActs.appendChild(btn);
  });
}

function startGame() {
  hideBubble();
  document.body.classList.add('shooting');
  duckMusic(false);   // shootout plays at full music volume
  hud.classList.remove('hidden');
  goalEl.textContent = TOTAL_BANDITS;
  score = 0;
  scoreEl.textContent = 0;
  gameActive = true;
  startTime = Date.now();

  elapsedTimer = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    timerEl.textContent = `${m}:${String(s % 60).padStart(2, '0')}`;
  }, 250);

  scheduleNextBandit(700);
}

function scheduleNextBandit(delay) {
  if (!gameActive) return;
  spawnTimer = setTimeout(() => {
    spawnBandit();
    if (gameActive) scheduleNextBandit(900 + Math.random() * 1100);
  }, delay);
}

function spawnBandit() {
  if (!gameActive) return;

  const img = document.createElement('img');
  img.src = BANDIT_IMGS[Math.floor(Math.random() * BANDIT_IMGS.length)];
  img.className = 'bandit';
  img.draggable = false;

  // Use visual viewport when available (better on iOS Safari)
  const vv = window.visualViewport;
  const w = vv ? vv.width  : window.innerWidth;
  const h = vv ? vv.height : window.innerHeight;
  const isMobile = w < 820;

  const banditW = isMobile
    ? Math.min(220, Math.max(140, w * 0.34))
    : Math.min(220, Math.max(120, w * 0.18));
  const banditH = banditW * 1.4;

  let minX, maxX, minY, maxY;

  if (isMobile) {
    // Phone: bandits live in the upper/middle band so they clear the bubble
    // (when shown) and Sam (always anchored bottom-left).
    minX = 8;
    maxX = w - banditW - 8;
    minY = 70;                         // below the HUD
    maxY = h * 0.55;                   // above Sam's territory
    if (maxY - minY < banditH + 10) {
      maxY = Math.min(h - banditH - 10, minY + banditH + 30);
    }
  } else {
    minX = Math.min(w * 0.30, 360);    // clear of desktop Sam on the left
    maxX = w - banditW - 10;
    minY = 60;
    maxY = h - banditH - 20;
  }

  const x = minX + Math.random() * Math.max(0, (maxX - minX));
  const y = minY + Math.random() * Math.max(0, (maxY - minY));

  img.style.left = x + 'px';
  img.style.top  = y + 'px';

  let alive = true;
  const lifespan = 1700 + Math.random() * 900;

  img.addEventListener('pointerdown', e => {
    if (!alive || !gameActive) return;
    alive = false;
    img.classList.add('hit');
    playGunshot();
    showBang(e.clientX, e.clientY);
    score++;
    scoreEl.textContent = score;
    flashCheer();
    setTimeout(() => img.remove(), 950);
    if (score >= TOTAL_BANDITS) winGame();
  });

  stage.appendChild(img);

  setTimeout(() => {
    if (alive && img.parentNode) {
      img.style.transition = 'opacity 0.4s, transform 0.4s';
      img.style.opacity = '0';
      img.style.transform = 'translateY(30px) scale(0.8)';
      setTimeout(() => img.remove(), 420);
    }
  }, lifespan);
}

  bang.textContent = ['BANG!', 'POW!', 'YEEHAW!', 'GOTCHA!'][Math.floor(Math.random() * 4)];

/* ============================================================
   CONFETTI
   ============================================================ */
const cv = document.getElementById('confetti');
const ctx = cv.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;

function resizeCanvas() {
  const vv = window.visualViewport;
  cv.width  = vv ? vv.width  : window.innerWidth;
  cv.height = vv ? vv.height : window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas);

/* Lock zoom/scroll on iOS so taps never pan the page during the game. */
document.addEventListener('gesturestart',  e => e.preventDefault());
document.addEventListener('touchmove', e => { if (gameActive) e.preventDefault(); }, { passive: false });

const COLORS = ['#ff4d6d', '#ffb84d', '#ffd84a', '#7ad3a3', '#4db8ff', '#c77dff', '#ff7ab6', '#fff5dc'];

function makePiece(x, y, vy0) {
  return {
    x, y,
    vx: (Math.random() - 0.5) * 6,
    vy: vy0 ?? (Math.random() * -3 - 2),
    g: 0.12 + Math.random() * 0.08,
    size: 6 + Math.random() * 8,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.3,
    shape: Math.random() < 0.5 ? 'rect' : 'circle',
    life: 0
  };
}

function startConfetti() {
  burstConfetti(220);
  if (!confettiRunning) {
    confettiRunning = true;
    requestAnimationFrame(loopConfetti);
  }
  // Stop spawning extras after a while; existing pieces still fall.
  setTimeout(() => { /* gentle fade handled by life check */ }, 4000);
}

function burstConfetti(count) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.25;
  for (let i = 0; i < count; i++) {
    const p = makePiece(
      cx + (Math.random() - 0.5) * window.innerWidth * 0.7,
      cy + (Math.random() - 0.5) * 80,
      Math.random() * -6 - 2
    );
    confettiPieces.push(p);
  }
}

function loopConfetti() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  for (let i = confettiPieces.length - 1; i >= 0; i--) {
    const p = confettiPieces[i];
    p.vy += p.g;
    p.x  += p.vx;
    p.y  += p.vy;
    p.rot += p.vr;
    p.life++;

    // Gentle fade after ~3.5 seconds (210 frames @ 60fps)
    const fade = p.life > 210 ? Math.max(0, 1 - (p.life - 210) / 60) : 1;

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    if (p.y > cv.height + 40 || fade <= 0) {
      confettiPieces.splice(i, 1);
    }
  }

  if (confettiPieces.length > 0) {
    requestAnimationFrame(loopConfetti);
  } else {
    confettiRunning = false;
    ctx.clearRect(0, 0, cv.width, cv.height);
  }
}

/* ---------- Boot ----------
   Flow on first tap:
     1. Splash fades out
     2. Doors video fades in and plays full-screen (with its own audio)
     3. When the video ends, Sam slides in from the left
     4. Once Sam lands, music starts and Scene 1 (voice + text) begins
*/
const splash    = document.getElementById('splash');
const splashBtn = document.getElementById('splash-btn');
const doorsVid  = document.getElementById('doors-video');

let booted = false;

function boot() {
  if (booted) return;
  booted = true;

  // Unlock all audio (including voice lines) while inside the user gesture.
  unlockAudio();

  // Fade out the splash card.
  splash.classList.add('gone');
  setTimeout(() => splash.remove(), 650);

  // Begin the doors video sequence.
  playDoorsThenContinue();
}

function playDoorsThenContinue() {
  let advanced = false;
  const advance = () => {
    if (advanced) return;
    advanced = true;

    // Fade out the video, then remove it.
    doorsVid.classList.remove('playing');
    setTimeout(() => doorsVid.classList.add('gone'), 600);

    // Pause the doors audio if still going for any reason.
    try { doorsVid.pause(); } catch (_) {}

    // Now bring up the music (real start — not just primed).
    startMusic();

    // Sam slides in from the left.
    document.body.classList.add('sam-entering');
    // Match the samEnter animation duration; just before it ends, mark him
    // "arrived" so he picks up the idle bob without a frame of blank state.
    setTimeout(() => {
      document.body.classList.add('sam-arrived');
      document.body.classList.remove('sam-entering');
    }, 1300);

    // Slight pause so Sam is fully on-screen before he speaks.
    setTimeout(intro, 1500);
  };

  // Show the video, start playback.
  doorsVid.classList.remove('gone');
  doorsVid.classList.add('playing');

  doorsVid.addEventListener('ended', advance, { once: true });
  doorsVid.addEventListener('error', advance, { once: true });

  // Safety net: if the video stalls forever, keep the show moving.
  setTimeout(advance, 30000);

  const p = doorsVid.play();
  if (p && typeof p.catch === 'function') {
    p.catch(() => advance());
  }
}

splashBtn.addEventListener('click',      boot);
splashBtn.addEventListener('touchstart', boot, { passive: true });
